<div class="page-container">
  <header class="page-header">
    <div class="header-title-row">
      <h1 class="page-title">Catálogo de Materias</h1>
      <app-button variant="primary" (clicked)="openFormModal()">
        <span class="material-symbols-outlined btn-icon-left">add</span>
        Nueva Materia
      </app-button>
    </div>
    <p class="page-subtitle">Gestiona las materias, semestres y docentes asignados en la plataforma.</p>
  </header>

  <div class="card-panel">
    <app-table
      [columns]="columns"
      [data]="tableRows()"
      [showActions]="true"
      (editClicked)="openFormModal($event)"
      (deleteClicked)="onDelete($event)">
    </app-table>
  </div>
</div>

<app-modal
  [isOpen]="isFormModalOpen()"
  [title]="selectedSubject() ? 'Editar Materia' : 'Nueva Materia'"
  (closed)="closeFormModal()">
  <app-subject-form
    [subject]="selectedSubject()"
    [semesterOptions]="semesterOptions()"
    [teacherOptions]="teacherOptions()"
    (save)="onSave($event)"
    (cancel)="closeFormModal()">
  </app-subject-form>
</app-modal>

<!-- Delete Confirmation Modal -->
<app-modal
  [isOpen]="isDeleteModalOpen()"
  title="Confirmar Eliminación"
  (closed)="closeDeleteModal()">

  <p style="margin: 0; color: var(--text-secondary); line-height: 1.5;">
    ¿Estás seguro de eliminar la materia <strong>"{{ subjectToDelete()?.name }}"</strong>?
    Esta acción no se puede deshacer.
  </p>

  <div modal-actions style="display: flex; gap: 12px; justify-content: flex-end; width: 100%;">
    <app-button variant="secondary" (clicked)="closeDeleteModal()">Cancelar</app-button>
    <app-button variant="primary" (clicked)="confirmDelete()">Sí, eliminar</app-button>
  </div>
</app-modal>

@if (showToast()) {
  <app-toast
    [type]="toastType()"
    [message]="toastMessage()"
    (closed)="onToastClosed()">
  </app-toast>
}
